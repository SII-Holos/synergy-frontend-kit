name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Verify skill bundles
        run: bun run verify:skills

      - name: Validate manifest schema
        run: bun run validate:manifest

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Validate plugin
        run: bun run validate:plugin

      - name: Build plugin
        run: bun run build:plugin

      - name: Pack plugin
        run: bun run pack:plugin
